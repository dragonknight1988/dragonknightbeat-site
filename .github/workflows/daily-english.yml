name: 📖 每日英语晨读

on:
  schedule:
    # 北京时间 06:30 = UTC 22:30 (前一天)，比新闻晚半小时，错开 API 调用
    - cron: '30 22 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ 检出 gh-pages 分支
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 安装依赖
        run: pip install requests

      - name: 🤖 生成英语晨读
        run: python3 scripts/generate_daily_english.py --output daily-english.json
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: 🚀 提交并推送
        run: |
          git config user.name "dragonknightbot"
          git config user.email "bot@dragonknightbeat.com"
          git add daily-english.json
          if git diff --staged --quiet; then
            echo "⚠️  无变更，跳过提交"
          else
            git commit -m "auto: 📖 每日英语晨读 $(date +%Y-%m-%d)"
            git push
            echo "✅ 已推送到 gh-pages"
          fi
