name: 📖 每日英语晨读

on:
  schedule:
    - cron: '30 22 * * *'
  push:
    branches: [main]
    paths: ['.github/workflows/daily-english.yml']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 📂 获取脚本
        run: git checkout origin/main -- scripts/
      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 📦 安装依赖
        run: pip install requests
      - name: ‼️ 切换到 gh-pages
        run: |
          cp -r scripts /tmp/scripts
          git checkout gh-pages
          cp -r /tmp/scripts scripts
      - name: 🤖 生成英语晨读
        run: python3 scripts/generate_daily_english.py --output daily-english.json
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      - name: 🚀 提交并推送
        run: |
          git config user.name "dragonknightbot"
          git config user.email "bot@dragonknightbeat.com"
          git add daily-english.json
          if git diff --staged --quiet; then
            echo "⚠️ 无变更"
          else
            git commit -m "auto: 📖 每日英语晨读 $(date +%Y-%m-%d)"
            git push --force
            echo "✅ 已推送"
          fi
