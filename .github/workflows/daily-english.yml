name: 📖 每日英语晨读

on:
  schedule:
    - cron: '30 22 * * *'  # 北京时间 06:30
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: gh-pages-english
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ 检出仓库（所有分支）
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📂 从 main 分支获取生成脚本
        run: |
          git checkout origin/main -- scripts/
          ls -la scripts/

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 安装依赖
        run: pip install requests

      - name: ‼️ 切换到 gh-pages 分支（保留脚本）
        run: |
          cp -r scripts /tmp/scripts
          git checkout gh-pages
          cp -r /tmp/scripts scripts

      - name: 🤖 生成英语晨读
        run: python3 scripts/generate_daily_english.py --output daily-english.json
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: 🔍 验证输出
        run: |
          ls -la daily-english.json 2>/dev/null && echo "✅ 文件存在" || echo "❌ 文件不存在"

      - name: 🚀 提交并推送
        run: |
          git config user.name "dragonknightbot"
          git config user.email "bot@dragonknightbeat.com"
          git add daily-english.json
          if git diff --staged --quiet; then
            echo "⚠️  无变更，跳过提交"
          else
            git commit -m "auto: 📖 每日英语晨读 $(date +%Y-%m-%d)"
            git fetch origin gh-pages && git rebase origin/gh-pages && git push --force
            echo "✅ 已推送到 gh-pages"
          fi
