name: 📰 每日新闻晨报
📖 每日英语晨读
💻 每日编程学习
📡 每日风口简报

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *
30 22 * * *
30 23 * * *
0 23 * * *'

concurrency:
  group: daily-content
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
      - name: 📂 从 main 取脚本
        run: |
          git fetch origin main
          git checkout origin/main -- scripts/
      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 📦 安装依赖
        run: pip install requests
      - name: 🤖 生成
        run: python3 scripts/generate_daily-news.py --output daily-news.json
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      - name: 🚀 提交并推送
        run: |
          git config user.name "dragonknightbot"
          git config user.email "bot@dragonknightbeat.com"
          git add daily-news.json
          if git diff --staged --quiet; then
            echo "⚠️ 无变更"
          else
            git commit -m "auto: daily-news $(date +%Y-%m-%d)"
            git push origin gh-pages
            echo "✅ 已推送"
          fi
