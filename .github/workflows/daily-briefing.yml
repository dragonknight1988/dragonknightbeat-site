name: 📡 每日风口简报

on:
  schedule:
    - cron: '0 23 * * *'   # 北京时间 07:00
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📂 获取脚本
        run: git checkout origin/main -- scripts/

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 安装依赖
        run: pip install requests

      - name: ‼️ 切换到 gh-pages
        run: |
          cp -r scripts /tmp/scripts
          git checkout gh-pages
          cp -r /tmp/scripts scripts

      - name: 🤖 生成风口简报
        run: python3 scripts/generate_daily_briefing.py --output daily-briefing.json
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: 🚀 提交并推送
        run: |
          git config user.name "dragonknightbot"
          git config user.email "bot@dragonknightbeat.com"
          git add daily-briefing.json
          if git diff --staged --quiet; then
            echo "⚠️  无变更"
          else
            git commit -m "auto: 📡 每日风口简报 $(date +%Y-%m-%d)"
            git push 2>/dev/null || (sleep 3 && git pull --rebase && git push)
            echo "✅ 已推送"
          fi
