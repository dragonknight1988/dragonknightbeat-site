name: 🚗 每日汽车新闻

on:
  push:
    branches: [gh-pages]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
      - name: 📂 从 main 取脚本
        run: |
          git fetch origin main
          git checkout origin/main -- scripts/
      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 📦 安装依赖
        run: pip install requests
      - name: 🤖 生成汽车新闻
        run: python3 scripts/generate_daily_auto.py --output daily-auto.json
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      - name: 🚀 提交并推送
        run: |
          git config user.name "dragonknightbot"
          git config user.email "bot@dragonknightbeat.com"
          git add daily-auto.json
          if git diff --staged --quiet; then
            echo "⚠️ 无变更"
          else
            git commit -m "auto: 🚗 $(date +%H:%M) $(date +%Y-%m-%d)"
            git push
            echo "✅ 已推送"
          fi
